<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Opsi 1 — Morphing Compose Pill | Arisan Digital</title>
<link rel="stylesheet" href="tokens.css">
<style>
/* ====== COMPOSE PILL MORPH ======
   The pill lives at the bottom of the screen.
   Collapsed: single row "Mulai sesuatu…" with two color dots.
   Expanded: morphs into a two-lane card with Arisan | Patungan.
*/

.screen-bg {
  padding: 20px 16px 0;
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: var(--app-bg);
}
.screen-bg::-webkit-scrollbar { display: none; }

/* Dimmer overlay */
.dimmer {
  position: absolute; inset: 0; z-index: 9;
  background: rgba(17,24,39,.3);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
  backdrop-filter: blur(1px);
}
.dimmer.active { opacity: 1; pointer-events: auto; }

/* Compose pill container */
.compose-container {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px 28px;
  z-index: 20;
  pointer-events: none;
}

/* The pill itself */
.compose-pill {
  background: var(--surface);
  border: 1.5px solid var(--line);
  border-radius: var(--r-pill);
  box-shadow: 0 4px 24px rgba(17,24,39,.12), 0 1px 3px rgba(17,24,39,.06);
  overflow: hidden;
  pointer-events: auto;
  transform-origin: bottom center;
  transition:
    border-radius .3s cubic-bezier(.4,0,.2,1),
    box-shadow .3s ease,
    border-color .3s ease;
}
.compose-pill.open {
  border-radius: 20px;
  border-color: transparent;
  box-shadow: 0 8px 40px rgba(17,24,39,.18), 0 2px 6px rgba(17,24,39,.08);
}

/* Collapsed row */
.pill-collapsed {
  height: 52px;
  display: flex; align-items: center;
  padding: 0 18px; gap: 10px;
  cursor: pointer;
  transition: background .15s;
}
.pill-collapsed:hover { background: var(--gray-soft); }
.compose-pill.open .pill-collapsed { display: none; }

.pill-plus {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--emerald) 0%, var(--lavender) 100%);
  display: grid; place-items: center; flex-shrink: 0;
  transition: transform .2s;
}
.compose-pill:hover .pill-plus { transform: rotate(90deg); }
.pill-text {
  flex: 1; font-size: 14px; color: var(--ink-3); font-weight: 500;
}
.pill-dots { display: flex; gap: 4px; align-items: center; }
.pill-dot { width: 7px; height: 7px; border-radius: 50%; }
.pill-dot.em { background: var(--emerald); }
.pill-dot.lv { background: var(--lavender); }

/* Expanded panel */
.pill-expanded {
  display: none;
  flex-direction: column;
  padding: 16px 16px 12px;
  gap: 10px;
}
.compose-pill.open .pill-expanded { display: flex; }

.pill-expand-label {
  font-size: 11px; font-weight: 700;
  color: var(--ink-2); letter-spacing: .06em;
  text-transform: uppercase; text-align: center;
  margin-bottom: 2px;
}

.expand-lanes {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}

.lane-btn {
  display: flex; flex-direction: column; align-items: flex-start;
  padding: 14px 14px;
  border-radius: 14px;
  border: none; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  text-align: left;
}
.lane-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(17,24,39,.1); }
.lane-btn:active { transform: translateY(0); }

.lane-btn.arisan {
  background: linear-gradient(135deg, var(--emerald-tint) 0%, var(--emerald-soft) 100%);
}
.lane-btn.patungan {
  background: linear-gradient(135deg, var(--lavender-tint) 0%, var(--lavender-soft) 100%);
}

.lane-icon {
  width: 36px; height: 36px; border-radius: 10px;
  display: grid; place-items: center;
  margin-bottom: 10px;
}
.lane-btn.arisan .lane-icon { background: var(--emerald); }
.lane-btn.patungan .lane-icon { background: var(--lavender-dark); }

.lane-title {
  font-size: 14px; font-weight: 800;
  letter-spacing: -.01em; line-height: 1;
  margin-bottom: 4px;
}
.lane-btn.arisan .lane-title { color: var(--emerald-dark); }
.lane-btn.patungan .lane-title { color: var(--lavender-dark); }
.lane-desc { font-size: 11px; line-height: 1.3; }
.lane-btn.arisan .lane-desc { color: var(--emerald-dark); opacity: .7; }
.lane-btn.patungan .lane-desc { color: var(--lavender-dark); opacity: .7; }

/* join option */
.join-btn {
  width: 100%;
  padding: 11px;
  border-radius: 12px;
  border: 1.5px dashed var(--line);
  background: transparent;
  color: var(--ink-2);
  font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: border-color .15s, color .15s;
  font-family: inherit;
}
.join-btn:hover { border-color: var(--emerald); color: var(--emerald-dark); }

/* close X */
.pill-close {
  position: absolute; top: 12px; right: 14px;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--gray-soft);
  display: none; place-items: center;
  cursor: pointer; border: none;
  color: var(--ink-2); transition: background .1s;
}
.pill-close:hover { background: var(--line); }
.compose-pill.open .pill-close { display: grid; }
.pill-expanded-header {
  position: relative;
}

/* Demo home content (blurred behind) */
.demo-content { padding-bottom: 90px; }
</style>
</head>
<body>
<div style="display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:40px 20px;">
<div class="phone-frame">

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" opacity=".3"/></svg>
      <svg width="15" height="12" viewBox="0 0 15 12" fill="currentColor"><path d="M7.5 2.5a6.5 6.5 0 0 1 4.6 1.9l1.4-1.4A8.5 8.5 0 0 0 7.5.5a8.5 8.5 0 0 0-6 2.5l1.4 1.4A6.5 6.5 0 0 1 7.5 2.5z" opacity=".4"/><path d="M7.5 5.5a3.5 3.5 0 0 1 2.5 1l1.4-1.4A5.5 5.5 0 0 0 7.5 3.5a5.5 5.5 0 0 0-3.9 1.6l1.4 1.4A3.5 3.5 0 0 1 7.5 5.5z"/><circle cx="7.5" cy="10" r="1.5"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="currentColor"><rect x="0" y="1" width="21" height="10" rx="3" stroke="currentColor" stroke-width="1.5" fill="none" opacity=".35"/><rect x="1.5" y="2.5" width="16" height="7" rx="1.5"/><path d="M22 4.5v3a1.5 1.5 0 0 0 0-3z"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="top-bar-greeting">Selamat pagi</span>
      <span class="top-bar-name">Ricky</span>
    </div>
    <div class="top-bar-right">
      <button class="icon-btn" aria-label="Notifikasi">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-dot"></span>
      </button>
      <div class="avatar-btn">RF</div>
    </div>
  </div>

  <!-- Dimmer -->
  <div class="dimmer" id="dimmer" onclick="closePill()"></div>

  <!-- Screen Content -->
  <div class="screen">
    <div class="demo-content" style="padding:16px 16px 0;">
      <div class="card" style="padding:16px;margin-bottom:12px;">
        <div style="font-size:11px;color:var(--ink-2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Iuran Jatuh Tempo</div>
        <div style="font-size:22px;font-weight:800;color:var(--ink-1);letter-spacing:-0.03em;">Rp 200.000</div>
        <div style="font-size:11px;color:var(--emerald-dark);margin-top:3px;">Arisan Keluarga Sari · 5 hari lagi</div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">
        <div class="card" style="padding:14px;">
          <div style="width:32px;height:32px;border-radius:10px;background:var(--emerald-soft);display:grid;place-items:center;margin-bottom:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--emerald-dark)" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </div>
          <div style="font-size:20px;font-weight:800;color:var(--ink-1);">3</div>
          <div style="font-size:11px;color:var(--ink-2);margin-top:2px;">Arisan Aktif</div>
        </div>
        <div class="card" style="padding:14px;">
          <div style="width:32px;height:32px;border-radius:10px;background:var(--lavender-soft);display:grid;place-items:center;margin-bottom:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--lavender-dark)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div style="font-size:20px;font-weight:800;color:var(--ink-1);">Rp 450K</div>
          <div style="font-size:11px;color:var(--ink-2);margin-top:2px;">Belum Dibayar</div>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">Aktivitas Terkini</span>
        <button class="section-link">Lihat semua</button>
      </div>
      <div class="card" style="padding:0 16px;">
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-soft);">
          <div style="width:36px;height:36px;border-radius:10px;background:var(--emerald-soft);display:grid;place-items:center;flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--emerald-dark)" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--ink-1);">Arisan Keluarga Sari</div><div style="font-size:11px;color:var(--ink-2);">Iuran bulan ini</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--ink-2);">Rp 200.000</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;">
          <div style="width:36px;height:36px;border-radius:10px;background:var(--lavender-soft);display:grid;place-items:center;flex-shrink:0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--lavender-dark)" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:var(--ink-1);">Makan malam Bali 🍽</div><div style="font-size:11px;color:var(--ink-2);">3 orang belum bayar</div></div>
          <div style="font-size:13px;font-weight:700;color:var(--warn);">Rp 324.000</div>
        </div>
      </div>
    </div>
  </div>

  <!-- COMPOSE PILL -->
  <div class="compose-container">
    <div class="compose-pill" id="composePill">

      <!-- COLLAPSED STATE -->
      <div class="pill-collapsed" onclick="openPill()">
        <div class="pill-plus">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <span class="pill-text">Mulai sesuatu baru…</span>
        <div class="pill-dots">
          <span class="pill-dot em"></span>
          <span class="pill-dot lv"></span>
        </div>
      </div>

      <!-- EXPANDED STATE -->
      <div class="pill-expanded">
        <button class="pill-close" onclick="closePill()" aria-label="Tutup">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="pill-expand-label">Mulai dengan apa?</div>
        <div class="expand-lanes">
          <button class="lane-btn arisan" onclick="alert('Buat Arisan')">
            <div class="lane-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <div class="lane-title">Arisan</div>
            <div class="lane-desc">Tabungan bergilir bersama teman &amp; keluarga</div>
          </button>
          <button class="lane-btn patungan" onclick="alert('Buat Patungan')">
            <div class="lane-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="lane-title">Patungan</div>
            <div class="lane-desc">Bagi tagihan &amp; lacak siapa yang sudah bayar</div>
          </button>
        </div>
        <button class="join-btn" onclick="alert('Gabung Arisan')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          Gabung arisan dengan kode undangan
        </button>
      </div>
    </div>
  </div>

</div>
</div>

<script>
const pill = document.getElementById('composePill');
const dimmer = document.getElementById('dimmer');

function openPill() {
  pill.classList.add('open');
  dimmer.classList.add('active');
}
function closePill() {
  pill.classList.remove('open');
  dimmer.classList.remove('active');
}
</script>
</body>
</html>
